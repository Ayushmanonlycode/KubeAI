apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-observability-worker
  namespace: ai-observability
  labels:
    app: ai-observability-backend
    component: worker
spec:
  # Worker MUST be exactly 1 replica to prevent duplicate collection
  # and graph write races.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-observability-backend
      component: worker
  template:
    metadata:
      labels:
        app: ai-observability-backend
        component: worker
    spec:
      serviceAccountName: ai-observability
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ai-observability-backend:v1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker"]
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
            - name: REDIS_URL
              value: redis://host.minikube.internal:56379/0
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: database-url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: gemini-api-key
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: GRAPH_PATH
              value: /data/dependency_graph.json
          volumeMounts:
            - name: graph-data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: graph-data
          persistentVolumeClaim:
            claimName: graph-data
