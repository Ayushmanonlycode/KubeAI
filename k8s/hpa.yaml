apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-observability-api-hpa
  namespace: ai-observability
  labels:
    app: ai-observability-backend
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-observability-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
