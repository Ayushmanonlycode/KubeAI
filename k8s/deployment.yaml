apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-observability-backend
  namespace: ai-observability
  labels:
    app: ai-observability-backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-observability-backend
      component: api
  template:
    metadata:
      labels:
        app: ai-observability-backend
        component: api
    spec:
      serviceAccountName: ai-observability
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          # Pin to an immutable tag or digest — never use :latest in production
          # image: ghcr.io/your-org/ai-observability-backend@sha256:abc123...
          image: ai-observability-backend:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: PROMETHEUS_URL
              value: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
            - name: REDIS_URL
              value: redis://host.minikube.internal:56379/0
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: database-url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: gemini-api-key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-observability-secrets
                  key: api-key
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: CORS_ORIGINS
              value: '["https://dashboard.example.com"]'
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp-dir
          emptyDir: {}
